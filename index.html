            { text: "What is the purpose of the 'sfr' keyword in 8051 C?", options: ["Define SFR address", "Define bit variable", "Define function", "Define array"], correct: 0, keyword: "sfr special function register", explanation_en: "'sfr' defines a special function register at a specific address.", explanation_vn: "'sfr' định nghĩa thanh ghi chức năng đặc biệt tại địa chỉ cụ thể." },
            { text: "Write C code to toggle only bit P2.4 without affecting other bits:", options: ["P2 ^= 0x10;", "P2 = 0x10;", "P2 |= 0x10;", "P2 &= ~0x10;"], correct: 0, keyword: "toggle bit XOR", explanation_en: "P2 ^= 0x10 toggles only bit 4 (0x10 = 00010000b).", explanation_vn: "P2 ^= 0x10 đảo chỉ bit 4 (0x10 = 00010000b)." },

            { text: "What is the advantage of using timer delay over for-loop delay?", options: ["More accurate", "Uses less code", "Doesn't block CPU", "All of the above"], correct: 3, keyword: "timer advantage", explanation_en: "Timer delay is accurate, non-blocking if using interrupts.", explanation_vn: "Delay bằng timer chính xác, không chặn CPU nếu dùng ngắt." },
            { text: "What is the value of TMOD to set Timer 0 in Mode 1 (16-bit timer)?", options: ["0x01", "0x02", "0x10", "0x20"], correct: 0, keyword: "TMOD 0x01", explanation_en: "Lower 4 bits: M1=0, M0=1 for Mode 1, C/T=0 → 0001b = 0x01.", explanation_vn: "4 bit thấp: M1=0, M0=1 cho Mode 1, C/T=0 → 0001b = 0x01." },

            { text: "Which TCON bit starts Timer 0?", options: ["TR0", "TR1", "TF0", "TF1"], correct: 0, keyword: "TR0 start timer", explanation_en: "TR0 (Timer Run 0) starts Timer 0 when set to 1.", explanation_vn: "TR0 (Timer Run 0) khởi động Timer 0 khi được set lên 1." },
            { text: "Which TCON bit indicates Timer 0 overflow?", options: ["TF0", "TR0", "TF1", "TR1"], correct: 0, keyword: "TF0 overflow flag", explanation_en: "TF0 is set when Timer 0 overflows from FFFFh to 0000h.", explanation_vn: "TF0 được set khi Timer 0 tràn từ FFFFh xuống 0000h." },

            { text: "Which bit in IE enables global interrupts?", options: ["EA", "ET0", "EX0", "ES"], correct: 0, keyword: "EA global enable", explanation_en: "EA (Enable All) must be set to enable any interrupt.", explanation_vn: "EA (Enable All) phải được set để cho phép bất kỳ ngắt nào." },
            { text: "What is the purpose of the IP (Interrupt Priority) register?", options: ["Set interrupt priority levels", "Enable interrupts", "Clear interrupts", "Store interrupt flags"], correct: 0, keyword: "IP priority", explanation_en: "IP register sets high priority for each interrupt source.", explanation_vn: "Thanh ghi IP đặt ưu tiên cao cho từng nguồn ngắt." },
            { text: "In 8051 C, how do you define an interrupt service routine for Timer 0?", options: ["void timer0_isr() interrupt 1", "void timer0_isr() interrupt 0", "void timer0_isr() using 1", "void timer0_isr()"], correct: 0, keyword: "interrupt 1", explanation_en: "Timer 0 uses interrupt number 1 in Keil C51.", explanation_vn: "Timer 0 dùng số hiệu ngắt 1 trong Keil C51." },
            { text: "What is the interrupt number for external interrupt 0 in Keil C51?", options: ["0", "1", "2", "3"], correct: 0, keyword: "INT0 interrupt 0", explanation_en: "External interrupt 0 uses interrupt number 0.", explanation_vn: "Ngắt ngoài 0 dùng số hiệu ngắt 0." },

            { text: "Which function in 8051 C sends a character via serial port?", options: ["SBUF = c; while(!TI); TI=0;", "printf(c);", "putchar(c);", "send(c);"], correct: 0, keyword: "SBUF transmit", explanation_en: "Load SBUF, wait for TI flag, then clear TI.", explanation_vn: "Nạp SBUF, chờ cờ TI, sau đó xóa TI." },
            { text: "Which function in 8051 C receives a character via serial port?", options: ["while(!RI); c=SBUF; RI=0;", "c=getchar();", "c=scanf();", "c=receive();"], correct: 0, keyword: "SBUF receive", explanation_en: "Wait for RI flag, read SBUF, then clear RI.", explanation_vn: "Chờ cờ RI, đọc SBUF, sau đó xóa RI." },
            { text: "What is the baud rate for 8051 serial port when using Timer 1 Mode 2 with TH1=0xFD, SMOD=0, XTAL=11.0592MHz?", options: ["9600", "4800", "19200", "2400"], correct: 0, keyword: "9600 baud TH1=0xFD", calculation: true, explanation_en: "With 11.0592MHz, TH1=0xFD gives 9600 baud at SMOD=0.", explanation_vn: "Với 11.0592MHz, TH1=0xFD cho 9600 baud khi SMOD=0." }
        ]
    };

    // User answers storage
    let userAnswers = { 0: {}, 1: {}, 2: {} };
    let currentChapter = 0;

    function renderQuiz(chapterIdx) {
        const questions = questionsData[chapterIdx];
        if (!questions) return;
        let html = `<div class="chapter-title">📖 ${chapterIdx === 0 ? 'Chapter 1: Introduction to Microcontrollers (30 questions)' : (chapterIdx === 1 ? 'Chapter 2: 8051 Architecture (30 questions)' : 'Chapter 3: C Programming, Timer, Serial, Interrupt (30 questions)')}</div>`;
        html += `<div class="progress-info">📊 Total: ${questions.length} questions | 🔑 Each question has keyword | 🌐 Bilingual explanation</div>`;
        
        questions.forEach((q, idx) => {
            const saved = userAnswers[chapterIdx]?.[idx] !== undefined ? userAnswers[chapterIdx][idx] : null;
            html += `<div class="question-item" data-qidx="${idx}">
                        <div class="question-text">
                            ${idx+1}. ${q.text}
                            <span class="keyword-badge">🔑 ${q.keyword}</span>
                        </div>
                        <div class="options">`;
            q.options.forEach((opt, optIdx) => {
                const checkedAttr = (saved === optIdx) ? 'checked' : '';
                const letter = String.fromCharCode(97 + optIdx);
                html += `<label><input type="radio" name="q${idx}" value="${optIdx}" ${checkedAttr}> ${letter}. ${opt}</label>`;
            });
            html += `</div><div class="feedback-area" id="fb-${chapterIdx}-${idx}"></div></div>`;
        });
        document.getElementById("dynamicQuiz").innerHTML = html;
        
        // Attach change events
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    userAnswers[currentChapter][i] = parseInt(e.target.value);
                });
            });
        }
        clearFeedbackDisplay(chapterIdx);
    }
    
    function clearFeedbackDisplay(chapterIdx) {
        const questions = questionsData[chapterIdx];
        if(!questions) return;
        for(let i = 0; i < questions.length; i++) {
            const fbDiv = document.getElementById(`fb-${chapterIdx}-${i}`);
            if(fbDiv) fbDiv.innerHTML = '';
        }
    }
    
    function submitChapter(chapterIdx) {
        const questions = questionsData[chapterIdx];
        if (!questions) return;
        let correctCount = 0;
        for (let i = 0; i < questions.length; i++) {
            const userChoice = userAnswers[chapterIdx]?.[i];
            const isCorrect = (userChoice === questions[i].correct);
            if (isCorrect && userChoice !== undefined) correctCount++;
            const fbDiv = document.getElementById(`fb-${chapterIdx}-${i}`);
            if (fbDiv) {
                const correctLetter = String.fromCharCode(97 + questions[i].correct);
                if (userChoice === undefined) {
                    fbDiv.innerHTML = `<div class="feedback wrong-feedback">❌ Not answered. Correct: ${correctLetter}. ${questions[i].options[questions[i].correct]}<br><span class="english">📖 EN: ${questions[i].explanation_en}</span><br><span class="vietnamese">🇻🇳 VN: ${questions[i].explanation_vn}</span></div>`;
                } else if (isCorrect) {
                    fbDiv.innerHTML = `<div class="feedback correct-feedback">✅ Correct! ${questions[i].keyword}<br><span class="english">📖 EN: ${questions[i].explanation_en}</span><br><span class="vietnamese">🇻🇳 VN: ${questions[i].explanation_vn}</span></div>`;
                } else {
                    fbDiv.innerHTML = `<div class="feedback wrong-feedback">❌ Wrong. Correct: ${correctLetter}. ${questions[i].options[questions[i].correct]}<br><span class="english">📖 EN: ${questions[i].explanation_en}</span><br><span class="vietnamese">🇻🇳 VN: ${questions[i].explanation_vn}</span></div>`;
                }
            }
        }
        const total = questions.length;
        const existingScoreDiv = document.getElementById("scoreToast");
        if(existingScoreDiv) existingScoreDiv.remove();
        const scoreDiv = document.createElement("div");
        scoreDiv.id = "scoreToast";
        scoreDiv.style = "background: #0f3b2c; color: white; padding: 12px 20px; border-radius: 50px; text-align: center; margin-top: 20px; font-weight: bold;";
        scoreDiv.innerText = `📊 Result: ${correctCount}/${total} (${Math.round(correctCount/total*100)}%)`;
        document.querySelector("#dynamicQuiz").appendChild(scoreDiv);
    }
    
    function resetChapter(chapterIdx) {
        userAnswers[chapterIdx] = {};
        renderQuiz(chapterIdx);
        const existingScoreDiv = document.getElementById("scoreToast");
        if(existingScoreDiv) existingScoreDiv.remove();
    }
    
    // Calculator
    function initCalculator() {
        const calcScreen = document.getElementById("calcScreen");
        let currentInput = "0";
        let pendingEval = false;
        const updateScreen = () => { calcScreen.innerText = currentInput.length > 25 ? currentInput.slice(0,25)+"…" : currentInput; };
        const handleButton = (val) => {
            if (val === 'C') {
                currentInput = "0";
                pendingEval = false;
                updateScreen();
                return;
            }
            if (val === '=') {
                try {
                    let expr = currentInput.toLowerCase();
                    expr = expr.replace(/([0-9A-Fa-f]+)(?![0-9A-Fa-fhx])/g, function(match) {
                        if(/^[0-9A-Fa-f]+$/.test(match) && !match.includes('x')) return '0x' + match;
                        return match;
                    }).replace(/H/g,'');
                    let result = eval(expr);
                    if (isNaN(result) || !isFinite(result)) throw new Error();
                    currentInput = result.toString();
                    pendingEval = true;
                } catch(e) {
                    currentInput = "Error";
                }
                updateScreen();
                return;
            }
            if (pendingEval && !isNaN(val) || val === '.') {
                currentInput = val;
                pendingEval = false;
            } else {
                if (currentInput === "0" && !isNaN(val) && val !== '.') currentInput = val;
                else currentInput += val;
            }
            updateScreen();
        };
        const buttons = ["7","8","9","/","C","4","5","6","*","(","1","2","3","-",")","0",".","+","=","Hex"];
        const container = document.getElementById("calcButtons");
        container.innerHTML = "";
        buttons.forEach(btn => {
            const btnEl = document.createElement("button");
            btnEl.innerText = btn;
            if (btn === "=" || btn === "+" || btn === "-" || btn === "*" || btn === "/") btnEl.classList.add("op-btn");
            if (btn === "C") btnEl.classList.add("clear-btn");
            btnEl.addEventListener("click", () => {
                if (btn === "Hex") {
                    let num = parseFloat(currentInput);
                    if (isNaN(num)) { currentInput = "NaN"; updateScreen(); return; }
                    currentInput = "0x" + Math.floor(num).toString(16).toUpperCase();
                    pendingEval = false;
                    updateScreen();
                } else handleButton(btn);
            });
            container.appendChild(btnEl);
        });
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if ((key >= '0' && key <= '9') || key === '+' || key === '-' || key === '*' || key === '/' || key === '.' || key === '(' || key === ')') {
                handleButton(key);
                e.preventDefault();
            } else if (key === 'Enter') handleButton('=');
            else if (key === 'Escape') handleButton('C');
        });
    }
    
    function setActiveChapter(chapIdx) {
        currentChapter = chapIdx;
        renderQuiz(chapIdx);
        document.querySelectorAll(".chapter-btn").forEach((btn, idx) => {
            if (parseInt(btn.getAttribute("data-chapter")) === chapIdx) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }
    
    function bindMenuEvents() {
        document.querySelectorAll(".chapter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const chap = parseInt(btn.getAttribute("data-chapter"));
                if (!isNaN(chap)) setActiveChapter(chap);
            });
        });
        document.getElementById("submitBtn").addEventListener("click", () => submitChapter(currentChapter));
        document.getElementById("resetChapBtn").addEventListener("click", () => resetChapter(currentChapter));
    }
    
    initCalculator();
    bindMenuEvents();
    setActiveChapter(0);
</script>
